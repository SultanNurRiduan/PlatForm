<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tambah Barang — Toko</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#10b981" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        .input-field {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #1e293b;
            background: #f8fafc;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .input-field:focus {
            border-color: #10b981;
            background: white;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.12);
        }
        .input-field::placeholder { color: #94a3b8; }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card-animate { animation: fadeSlideIn 0.35s ease both; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(20px); }
        }
        .toast-show { animation: toastIn 0.3s ease both; }
        .toast-hide { animation: toastOut 0.3s ease both; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-4">
            <a href="index.html" class="w-9 h-9 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition text-slate-500">
                <i class="fa-solid fa-arrow-left" style="font-size:15px;"></i>
            </a>
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-emerald-500 flex items-center justify-center shadow-sm">
                    <i class="fa-solid fa-cart-shopping text-white" style="font-size:16px;"></i>
                </div>
                <div>
                    <h1 class="text-base font-extrabold text-slate-800 leading-tight">Tambah Barang</h1>
                    <p class="text-xs text-slate-400 leading-none">Manajemen Inventaris</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10 flex justify-center">
        <div class="card-animate bg-white border border-slate-200 rounded-2xl shadow-sm w-full max-w-md overflow-hidden">

            <!-- Card Header -->
            <div class="bg-gradient-to-r from-emerald-500 to-teal-500 px-6 py-5 flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-white/20 flex items-center justify-center">
                    <i class="fa-solid fa-plus text-white" style="font-size:15px;"></i>
                </div>
                <div>
                    <h2 class="text-white font-extrabold text-base leading-tight">Barang Baru</h2>
                    <p class="text-emerald-100 text-xs">Isi data barang yang ingin ditambahkan</p>
                </div>
            </div>

            <!-- Card Body -->
            <div class="px-6 py-6 space-y-5">

                <!-- Input Nama Barang -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
                        <i class="fa-solid fa-tag mr-1 text-emerald-400"></i>Nama Barang
                    </label>
                    <input
                        id="input-nama"
                        type="text"
                        placeholder="Contoh: Minyak Goreng 1L"
                        class="input-field"
                    />
                    <p id="error-nama" class="text-red-500 text-xs mt-1 hidden">
                        <i class="fa-solid fa-circle-exclamation mr-1"></i>Nama barang wajib diisi.
                    </p>
                </div>

                <!-- Input Harga -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
                        <i class="fa-solid fa-coins mr-1 text-emerald-400"></i>Harga (Rp)
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-semibold">Rp</span>
                        <input
                            id="input-harga"
                            type="number"
                            placeholder="Contoh: 15000"
                            min="0"
                            class="input-field pl-10"
                        />
                    </div>
                    <p id="error-harga" class="text-red-500 text-xs mt-1 hidden">
                        <i class="fa-solid fa-circle-exclamation mr-1"></i>Harga wajib diisi dan harus lebih dari 0.
                    </p>
                </div>

            </div>

            <!-- Card Footer -->
            <div class="px-6 pb-6 flex items-center gap-3">
                <a
                    href="index.html"
                    class="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm font-semibold hover:bg-slate-50 active:scale-95 transition-all text-center"
                >
                    Batal
                </a>
                <button
                    id="btn-simpan"
                    onclick="simpanBarang()"
                    class="flex-1 py-2.5 rounded-xl bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white text-sm font-semibold transition-all shadow-sm flex items-center justify-center gap-2"
                >
                    <i class="fa-solid fa-floppy-disk"></i>
                    Simpan
                </button>
            </div>

        </div>
    </main>

    <!-- FOOTER -->
    <footer class="max-w-5xl mx-auto px-6 py-6 mt-4 border-t border-slate-200 text-center text-xs text-slate-400">
        <i class="fa-solid fa-store mr-1"></i>
        Aplikasi Toko &mdash; Praktikum Integrasi Frontend &amp; API &bull; Pertemuan 3
    </footer>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 hidden">
        <div id="toast-inner" class="flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-xl text-sm font-semibold">
            <i id="toast-icon"></i>
            <span id="toast-pesan"></span>
        </div>
    </div>

    <script>
        const API_TAMBAH = 'http://platform.test:8080/api-toko/tambah_barang.php';

        function sembunyikanError() {
            document.getElementById('error-nama').classList.add('hidden');
            document.getElementById('error-harga').classList.add('hidden');
        }

        async function simpanBarang() {
            const nama  = document.getElementById('input-nama').value.trim();
            const harga = document.getElementById('input-harga').value;

            // Validasi
            let valid = true;
            sembunyikanError();

            if (!nama) {
                document.getElementById('error-nama').classList.remove('hidden');
                valid = false;
            }
            if (!harga || Number(harga) <= 0) {
                document.getElementById('error-harga').classList.remove('hidden');
                valid = false;
            }
            if (!valid) return;

            // Loading state
            const btn = document.getElementById('btn-simpan');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...`;

            try {
                const response = await fetch(API_TAMBAH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nama_barang: nama, harga: Number(harga) })
                });

                const hasil = await response.json();

                if (hasil.status === 'sukses') {
                    tampilkanToast('success', 'Barang berhasil ditambahkan!');
                    // Reset form
                    document.getElementById('input-nama').value = '';
                    document.getElementById('input-harga').value = '';
                    // Redirect ke index setelah 1.5 detik
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                } else {
                    tampilkanToast('error', hasil.pesan || 'Gagal menyimpan data.');
                }

            } catch (err) {
                tampilkanToast('error', 'Koneksi ke server gagal.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> Simpan`;
            }
        }

        // Simpan dengan Enter
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') simpanBarang();
        });

        let toastTimer;
        function tampilkanToast(tipe, pesan) {
            const toast      = document.getElementById('toast');
            const toastInner = document.getElementById('toast-inner');
            const toastIcon  = document.getElementById('toast-icon');
            const toastPesan = document.getElementById('toast-pesan');

            toastPesan.textContent = pesan;

            if (tipe === 'success') {
                toastInner.className = 'flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-xl text-sm font-semibold bg-emerald-500 text-white';
                toastIcon.className  = 'fa-solid fa-circle-check';
            } else {
                toastInner.className = 'flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-xl text-sm font-semibold bg-red-500 text-white';
                toastIcon.className  = 'fa-solid fa-circle-xmark';
            }

            toast.classList.remove('hidden');
            toast.classList.add('toast-show');
            toast.classList.remove('toast-hide');

            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.add('toast-hide');
                toast.classList.remove('toast-show');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        }
    </script>
</body>
</html>
